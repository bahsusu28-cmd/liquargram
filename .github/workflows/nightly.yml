name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build-nightly:
    uses: ./.github/workflows/build.yml
    
  upload-nightly:
    needs: build-nightly
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Create Nightly Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: nightly-${{ github.run_number }}
        name: Nightly Build ${{ github.run_number }}
        draft: false
        prerelease: true
        files: |
          artifacts/Liquargram-Windows-x64/Liquargram.exe
          artifacts/Liquargram-macOS/Liquargram.dmg
          artifacts/Liquargram-Linux-x86_64/Liquargram-Linux-x86_64.AppImage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
