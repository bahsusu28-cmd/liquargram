name: Build Liquargram Windows

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ../Libraries
          ../win64/Libraries
        key: ${{ runner.os }}-deps-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-
          
    - name: Build Dependencies
      shell: cmd
      run: |
        cd Telegram\build
        python configure.py -D DESKTOP_APP_USE_PACKAGED=OFF
        
    - name: Build Liquargram
      shell: cmd
      run: |
        cmake --build out --config Release --target Telegram
        
    - name: Package
      run: |
        mkdir release
        copy out\Release\Telegram.exe release\Liquargram.exe
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Liquargram-Windows-x64
        path: release/Liquargram.exe
        retention-days: 30

  create-release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Liquargram v${{ github.run_number }}
        draft: false
        prerelease: false
        files: artifacts/Liquargram-Windows-x64/Liquargram.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
