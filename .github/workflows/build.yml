name: Build Liquargram

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ../Libraries
          ../win64/Libraries
        key: ${{ runner.os }}-deps-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-
          
    - name: Build Dependencies
      shell: cmd
      run: |
        cd Telegram\build
        python configure.py -D DESKTOP_APP_USE_PACKAGED=OFF
        
    - name: Build Liquargram
      shell: cmd
      run: |
        cmake --build out --config Release --target Telegram
        
    - name: Package
      run: |
        mkdir release
        copy out\Release\Telegram.exe release\Liquargram.exe
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Liquargram-Windows-x64
        path: release/Liquargram.exe
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        brew install cmake ninja pkg-config
        
    - name: Cache Dependencies
      uses: actions/cache@v4
      with:
        path: ../Libraries
        key: ${{ runner.os }}-deps-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-
          
    - name: Build Dependencies
      run: |
        cd Telegram/build
        python3 configure.py -D DESKTOP_APP_USE_PACKAGED=OFF
        
    - name: Build Liquargram
      run: |
        export QT=6.8
        cmake --build out --config Release --target Telegram
        
    - name: Package
      run: |
        mkdir -p release
        cp -r out/Release/Telegram.app release/Liquargram.app
        
    - name: Create DMG
      run: |
        brew install create-dmg
        create-dmg \
          --volname "Liquargram" \
          --window-pos 200 120 \
          --window-size 800 400 \
          --icon-size 100 \
          --app-drop-link 600 185 \
          "release/Liquargram.dmg" \
          "release/Liquargram.app"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Liquargram-macOS
        path: release/Liquargram.dmg
        retention-days: 30

  build-linux:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build pkg-config \
          libglib2.0-dev libgtk-3-dev \
          libx11-dev libxrandr-dev libxrender-dev \
          libxcomposite-dev libxdamage-dev libxext-dev \
          libwayland-dev libpulse-dev libasound2-dev \
          libssl-dev zlib1g-dev
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache Dependencies
      uses: actions/cache@v4
      with:
        path: ../Libraries
        key: ${{ runner.os }}-deps-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-
          
    - name: Build Dependencies
      run: |
        cd Telegram/build
        python3 configure.py -D DESKTOP_APP_USE_PACKAGED=OFF
        
    - name: Build Liquargram
      run: |
        export QT=6.8
        cmake --build out --config Release --target Telegram
        
    - name: Package AppImage
      run: |
        mkdir -p release/AppDir/usr/bin
        mkdir -p release/AppDir/usr/share/applications
        mkdir -p release/AppDir/usr/share/icons/hicolor/512x512/apps
        
        cp out/Release/Telegram release/AppDir/usr/bin/liquargram
        
        cat > release/AppDir/usr/share/applications/liquargram.desktop << EOF
        [Desktop Entry]
        Version=1.0
        Type=Application
        Name=Liquargram
        Comment=Liquargram Desktop
        Exec=liquargram
        Icon=liquargram
        Terminal=false
        Categories=Network;InstantMessaging;
        EOF
        
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        
        ./linuxdeploy-x86_64.AppImage --appdir release/AppDir --output appimage
        mv Liquargram*.AppImage release/Liquargram-Linux-x86_64.AppImage || true
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Liquargram-Linux-x86_64
        path: release/Liquargram-Linux-x86_64.AppImage
        retention-days: 30

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Liquargram v${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          artifacts/Liquargram-Windows-x64/Liquargram.exe
          artifacts/Liquargram-macOS/Liquargram.dmg
          artifacts/Liquargram-Linux-x86_64/Liquargram-Linux-x86_64.AppImage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
