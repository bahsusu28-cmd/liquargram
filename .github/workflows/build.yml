name: Build Liquargram Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Restore Dependencies Cache
      uses: actions/cache@v5
      with:
        path: |
          ../Libraries
          ../win64/Libraries
          ../ThirdParty
        key: tdesktop-deps-${{ hashFiles('Telegram/build/prepare/win.bat') }}
        fail-on-cache-miss: true
        
    - name: Configure Project
      shell: cmd
      run: |
        cd Telegram
        python configure.py x64 ^
          -D TDESKTOP_API_ID=94575 ^
          -D TDESKTOP_API_HASH=a3406de8d171bb422bb6ddf3bbd800e2
        
    - name: Build Liquargram
      shell: cmd
      run: |
        cd Telegram
        cmake --build out --config Release --target Telegram
        
    - name: Package
      run: |
        mkdir release
        copy Telegram\out\Release\Telegram.exe release\Liquargram.exe
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Liquargram-Windows-x64
        path: release/Liquargram.exe
        retention-days: 30

  create-release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Liquargram v${{ github.run_number }}
        draft: false
        prerelease: false
        files: artifacts/Liquargram-Windows-x64/Liquargram.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
