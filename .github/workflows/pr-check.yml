name: PR Check

on:
  pull_request:
    branches: [ main, dev ]

jobs:
  check-build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
        
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build pkg-config libglib2.0-dev
        
    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: |
        brew install cmake ninja pkg-config
        
    - name: Cache Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ../Libraries
          ../win64/Libraries
        key: ${{ runner.os }}-deps-${{ hashFiles('**/CMakeLists.txt') }}
        
    - name: Configure
      shell: bash
      run: |
        cd Telegram/build
        python3 configure.py -D DESKTOP_APP_USE_PACKAGED=OFF || python configure.py -D DESKTOP_APP_USE_PACKAGED=OFF
        
    - name: Build (Debug)
      shell: bash
      run: |
        cmake --build out --config Debug --target Telegram
